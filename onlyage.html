<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator | Jarfanmade</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    padding:20px;
}

.container{
    width:100%;
    max-width:800px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:25px;
    padding:30px;
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:.8;
    margin-bottom:25px;
}

.input-group{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

input{
    padding:15px;
    border:none;
    border-radius:12px;
    text-align:center;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    background:#00e5ff;
}

button:hover{
    opacity:.9;
}

.result{
    display:none;
    margin-top:25px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

.card{
    background:rgba(255,255,255,.15);
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.number{
    font-size:32px;
    font-weight:bold;
}

.label{
    opacity:.8;
}

.extra{
    margin-top:20px;
    background:rgba(255,255,255,.1);
    padding:20px;
    border-radius:15px;
    line-height:2;
}

@media(max-width:600px){

.cards{
    grid-template-columns:1fr;
}

.input-group{
    grid-template-columns:1fr;
}

}
</style>
</head>
<body>

<div class="container">

<h1>🎂 Know your AGE</h1>
<p class="subtitle">Enter your Date of Birth manually</p>

<div class="input-group">
<input type="number" id="day" placeholder="Day" min="1" max="31">
<input type="number" id="month" placeholder="Month" min="1" max="12">
<input type="number" id="year" placeholder="Year">
</div>

<button id="actionBtn" onclick="calculateAge()">
    Calculate Age
</button>

<div class="result" id="result">

<div class="cards">

<div class="card">
<div class="number" id="years">0</div>
<div class="label">Years</div>
</div>

<div class="card">
<div class="number" id="months">0</div>
<div class="label">Months</div>
</div>

<div class="card">
<div class="number" id="days">0</div>
<div class="label">Days</div>
</div>

</div>

<div class="extra" id="extraInfo"></div>

</div>

</div>

<script>

function calculateAge(){

let day=parseInt(document.getElementById("day").value);
let month=parseInt(document.getElementById("month").value);
let year=parseInt(document.getElementById("year").value);

if(!day || !month || !year){
alert("Please enter complete date");
return;
}

let birthDate=new Date(year,month-1,day);

if(
birthDate.getDate()!=day ||
birthDate.getMonth()!=month-1 ||
birthDate.getFullYear()!=year
){
alert("Invalid Date");
return;
}

let today=new Date();

let years=today.getFullYear()-year;
let months=today.getMonth()-(month-1);
let days=today.getDate()-day;

if(days<0){
months--;
days+=new Date(
today.getFullYear(),
today.getMonth(),
0
).getDate();
}

if(months<0){
years--;
months+=12;
}

document.getElementById("years").innerText=years;
document.getElementById("months").innerText=months;
document.getElementById("days").innerText=days;

let totalDays=Math.floor(
(today-birthDate)/(1000*60*60*24)
);

let totalWeeks=Math.floor(totalDays/7);
let totalMonths=years*12+months;
let totalHours=totalDays*24;

let nextBirthday=new Date(
today.getFullYear(),
month-1,
day
);

if(nextBirthday<today){
nextBirthday.setFullYear(
today.getFullYear()+1
);
}

let birthdayCountdown=Math.ceil(
(nextBirthday-today)/(1000*60*60*24)
);

const weekDays=[
"Sunday",
"Monday",
"Tuesday",
"Wednesday",
"Thursday",
"Friday",
"Saturday"
];

let birthDayName=
weekDays[birthDate.getDay()];

document.getElementById("extraInfo").innerHTML=`

<b>📅 Born On:</b> ${birthDayName}<br>

<b>📆 Total Months:</b> ${totalMonths}<br>

<b>📅 Total Weeks:</b> ${totalWeeks.toLocaleString()}<br>

<b>📈 Total Days:</b> ${totalDays.toLocaleString()}<br>

<b>⏰ Total Hours:</b> ${totalHours.toLocaleString()}<br>

<b>🎉 Next Birthday In:</b> ${birthdayCountdown} Days

`;

document.getElementById("result").style.display="block";

let btn=document.getElementById("actionBtn");

btn.innerHTML="Calculate More ➜";
btn.style.background="#ffffff";
btn.onclick=resetCalculator;

}

function resetCalculator(){

document.getElementById("day").value="";
document.getElementById("month").value="";
document.getElementById("year").value="";

document.getElementById("result").style.display="none";

let btn=document.getElementById("actionBtn");

btn.innerHTML="Calculate Age";
btn.style.background="#00e5ff";
btn.onclick=calculateAge;

document.getElementById("day").focus();

}

// ENTER KEY NAVIGATION

document.getElementById("day").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        document.getElementById("month").focus();
    }
});

document.getElementById("month").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        document.getElementById("year").focus();
    }
});

document.getElementById("year").addEventListener("keydown", function(e){
    if(e.key === "Enter"){

        let btn = document.getElementById("actionBtn");

        if(btn.innerText.includes("Calculate More")){
            resetCalculator();
        }else{
            calculateAge();
        }

    }
});

// GLOBAL ENTER SUPPORT

document.addEventListener("keydown", function(e){

    if(e.key !== "Enter") return;

    let btn = document.getElementById("actionBtn");

    if(btn.innerText.includes("Calculate More")){

        if(document.activeElement.id !== "day" &&
           document.activeElement.id !== "month" &&
           document.activeElement.id !== "year"){

            resetCalculator();
        }
    }

});
</script>

</body>
</html>
